# ============================================
# Quantumult X 配置文件
# 由 Shadowrocket intconfig.conf 转换而来
# ============================================
# 💡 节点过滤提示：
#    在 Quantumult X 中，长按节点即可直接禁用，
#    被禁用的节点不会参与任何策略组选择。
# ============================================

[general]
# 代理延迟测速 URL
server_check_url = http://www.apple.com/library/test/success.html
# 资源解析器（可选，取消注释启用）
# resource_parser_url = https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
# 网络检测 URL
network_check_url = http://connectivitycheck.platform.hicloud.com/generate_204
# DNS 排除列表
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me
# 运行模式（running_mode_trigger 可根据 Wi-Fi 自动切换）
# running_mode_trigger = filter, filter, WiFi名称:all_direct
# geo_location_checker 用于节点 IP 地理位置检测（节点页面的旗帜信息）
geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
# 排除路由
excluded_routes = 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.168.0.0/16, 224.0.0.0/4, 255.255.255.255/32
# 关闭 UDP
udp_drop_list = 443

[dns]
# 禁用 IPv6
no-ipv6
# 禁用系统 DNS
no-system
# 国内 DNS
server = 223.5.5.5
server = 114.114.114.114
# 指定域名 DNS
server = /baidu.com/114.114.114.114
server = /qq.com/114.114.114.114
server = /weixin.qq.com/114.114.114.114
server = /taobao.com/223.5.5.5
server = /aliyun.com/223.5.5.5
server = /jd.com/114.114.114.114
# 国外域名 DNS
server = /google.com/8.8.8.8
server = /youtube.com/8.8.8.8
server = /github.com/1.1.1.1
server = /anthropic.com/1.1.1.1
server = /claude.ai/1.1.1.1

[policy]
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 📋 节点过滤说明
#    1. 可在各策略组的 resource-tag-regex / server-tag-regex 中用正则过滤
#    2. 更简单的方式：在节点列表中长按节点 → 禁用，即可全局剔除
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# 主入口（手动选择）
static = 节点选择, Claude, 自动选择, 香港节点, 美国节点, 日本节点, 新加坡节点, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png

# Claude / Google 专用（⚠️ 严格策略：仅走美国节点，无可用节点时断联，不回退其他分组或直连）
static = Claude, 美国节点, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/America.png

# 自动选择（全部节点选最快，排除信息节点）
url-latency-benchmark = 自动选择, server-tag-regex=^(?!.*(剩余流量|距离下次重置|套餐到期|请去使用|防失联)).*$, check-interval=300, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png

# 香港节点
url-latency-benchmark = 香港节点, server-tag-regex=^(?!.*(剩余流量|距离下次重置|套餐到期|请去使用|防失联)).*(港|HK|Hong Kong|🇭🇰).*$, check-interval=300, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png

# 美国节点
url-latency-benchmark = 美国节点, server-tag-regex=^(?!.*(剩余流量|距离下次重置|套餐到期|请去使用|防失联)).*(美|US|United States|🇺🇸).*$, check-interval=300, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png

# 日本节点
url-latency-benchmark = 日本节点, server-tag-regex=^(?!.*(剩余流量|距离下次重置|套餐到期|请去使用|防失联)).*(日|JP|Japan|🇯🇵).*$, check-interval=300, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png

# 新加坡节点
url-latency-benchmark = 新加坡节点, server-tag-regex=^(?!.*(剩余流量|距离下次重置|套餐到期|请去使用|防失联)).*(新|坡|SG|Singapore|🇸🇬).*$, check-interval=300, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png

[server_remote]
# ============================================
# 在此添加你的机场订阅链接，格式：
# 订阅链接, tag=机场名称, update-interval=172800, opt-parser=true, enabled=true
# ============================================
# 示例（取消注释并替换为你的订阅链接）：
# https://your-subscription-url, tag=我的机场, update-interval=172800, opt-parser=true, enabled=true

[server_local]
# 本地节点（如有需要手动添加）

[filter_remote]
# ============================================
# 远程分流规则（可选，取消注释启用更全面的规则集）
# ============================================
# https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Advertising/Advertising.list, tag=广告拦截, force-policy=reject, update-interval=172800, enabled=true
# https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/China/China.list, tag=国内直连, force-policy=direct, update-interval=172800, enabled=true

[filter_local]
# ── 局域网直连 ──
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 127.0.0.0/8, direct

# ── Claude / Anthropic ──
host-suffix, anthropic.com, Claude
host-suffix, claude.ai, Claude
host-suffix, claude.com, Claude
ip-cidr, 160.79.104.0/23, Claude
ip-cidr, 209.249.57.0/24, Claude

# ── Google 服务（走美国节点）──
host-suffix, google.com, Claude
host-suffix, googleapis.com, Claude
host-suffix, googleusercontent.com, Claude
host-suffix, gstatic.com, Claude
host-suffix, gmail.com, Claude
host-suffix, googlesource.com, Claude
host-suffix, chromium.org, Claude
host-suffix, google.com.hk, Claude

# ── YouTube（走自动选择最快节点）──
host-suffix, youtube.com, 自动选择
host-suffix, googlevideo.com, 自动选择
host-suffix, ytimg.com, 自动选择
host-suffix, yt3.ggpht.com, 自动选择
host-suffix, youtu.be, 自动选择

# ── 常用代理域名 ──
host-suffix, twitter.com, 节点选择
host-suffix, x.com, 节点选择
host-suffix, facebook.com, 节点选择
host-suffix, instagram.com, 节点选择
host-suffix, whatsapp.com, 节点选择
host-suffix, telegram.org, 节点选择
host-suffix, t.me, 节点选择
host-suffix, github.com, 节点选择
host-suffix, githubusercontent.com, 节点选择
host-suffix, openai.com, 节点选择
host-suffix, chatgpt.com, 节点选择
host-suffix, notion.so, 节点选择
host-suffix, dropbox.com, 节点选择
host-suffix, wikimedia.org, 节点选择
host-suffix, wikipedia.org, 节点选择

# ── 国内直连域名 ──
host-suffix, baidu.com, direct
host-suffix, qq.com, direct
host-suffix, weixin.qq.com, direct
host-suffix, wechat.com, direct
host-suffix, taobao.com, direct
host-suffix, tmall.com, direct
host-suffix, jd.com, direct
host-suffix, alipay.com, direct
host-suffix, aliyun.com, direct
host-suffix, alibaba.com, direct
host-suffix, bilibili.com, direct
host-suffix, zhihu.com, direct
host-suffix, weibo.com, direct
host-suffix, douyin.com, direct
host-suffix, tiktok.com, direct
host-suffix, 163.com, direct
host-suffix, 126.com, direct
host-suffix, sina.com.cn, direct
host-suffix, sohu.com, direct
host-suffix, iqiyi.com, direct
host-suffix, youku.com, direct
host-suffix, meituan.com, direct
host-suffix, dianping.com, direct
host-suffix, pinduoduo.com, direct
host-suffix, xiaohongshu.com, direct
