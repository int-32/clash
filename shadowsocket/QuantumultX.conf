[rewrite_remote]
# ============================================
# 远程重写规则（可选，取消注释启用）
# ============================================
# YouTube 去广告（推荐）
# https://raw.githubusercontent.com/DivineEngine/Profiles/master/Quantumult/Rewrite/Block/YouTubeAds.conf, tag=YouTube去广告, update-interval=172800, enabled=true
# 通用去广告
# https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rewrite/QuantumultX/Advertising/Advertising.conf, tag=广告拦截重写, update-interval=172800, enabled=true

[rewrite_local]
# 百度搜索去跳转
^https?://www\.baidu\.com/s\?.*wd=([^&]+).* url 302 https://www.baidu.com/s?wd=$1

[task_local]
# ============================================
# 定时任务（可选）
# ============================================
# 流媒体解锁检测（每天 8:00 检测）
# 0 8 * * * https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/streaming_media_check.js, tag=流媒体解锁检测, enabled=true

[mitm]
# ============================================
# MITM (中间人) - 需要安装并信任证书
# Quantumult X → 设置 → MitM → 生成证书 → 安装 → 信任
# ============================================
hostname = www.baidu.com
